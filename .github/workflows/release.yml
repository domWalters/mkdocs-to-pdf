---
name: Release
on:
  push:
    tags:
      - "v*"
permissions:
  contents: read
jobs:
  build-package:
    name: Build package
    runs-on: ubuntu-latest
    environment:
      name: release
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync
        run: make sync

      - name: Build package
        run: make build

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  publish-package:
    name: Publish package
    runs-on: ubuntu-latest
    needs:
      - build-package
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Retrieve package
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
